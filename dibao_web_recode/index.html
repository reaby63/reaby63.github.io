<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帝堡實業有限公司</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- bootstrap套用 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Swiper套用 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css">
    <script>
        // 套共用元件方式
        const layouts = [
            { file: 'layout/Header.html', id: 'header' },
            { file: 'layout/Footer.html', id: 'footer' }
        ];

        layouts.forEach(layout => {
            fetch(layout.file)
                .then(res => res.text())
                .then(html => {
                    document.getElementById(layout.id).innerHTML = html;
                })
                .catch(err => console.error(`載入 ${layout.file} 失敗`, err));
        });

        // 將data內的同樣資料套變數 共用函式
        function replaceVars(str, vars) {
            if (!str) return '';
            return str.replace(/\{\{\s*(.*?)\s*\}\}/g, (_, key) => vars[key.trim()] || '');
        }
    </script>
    <script src="./js/layout/footer.js"></script>
    <script src="./js/layout/header.js"></script>
</head>
<body>
    <div id="header"></div>
    
    <main id="main-content">
        <!-- 內容 -->
    </main>
    
    <div id="footer"></div>
</body>

<!-- bootstrap套用 -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- Swiper套用 -->
<script src="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.js"></script>
<!-- 其他套用 -->
<script src="./js/page.js"></script>
</html>
